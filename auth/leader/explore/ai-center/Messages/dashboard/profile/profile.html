<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="profile.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- TOP HEADER -->
<section class="header">
  <h1>Ayesha Khan</h1>
  <p>Both • Karachi</p>
</section>

<!-- MAIN -->
<section class="profile-container">

  <!-- LEFT SIDE -->
  <div class="profile-card">

    <h4>PUBLIC PROFILE</h4>
    <h2>Skills and reputation</h2>

    <div class="row">
      <span>Trust score</span>
      <strong>92%</strong>
    </div>

    <div class="row">
      <span>Contributions</span>
      <strong>31</strong>
    </div>

    <h5>Skills</h5>
    <div class="tags">
      <span>Figma</span>
      <span>UI/UX</span>
      <span>HTML/CSS</span>
      <span>Career Guidance</span>
    </div>

    <h5>Badges</h5>
    <div class="tags">
      <span>Design Ally</span>
      <span>Fast Responder</span>
      <span>Top Mentor</span>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="edit-card">

    <h4>EDIT PROFILE</h4>
    <h2>Update your identity</h2>

    <div class="input-row">
      <input type="text" value="Ayesha Khan">
      <input type="text" value="Karachi">
    </div>

    <input type="text" value="Figma, UI/UX, HTML/CSS, Career Guidance">
    <input type="text" value="Hackathons, UI/UX, Community Building">

    <button>Save profile</button>

  </div>

</section>

</body>
</html>
